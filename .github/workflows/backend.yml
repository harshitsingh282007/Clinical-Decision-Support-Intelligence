name: Deploy CDSI Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: |
          pnpm run typecheck:libs
          pnpm --filter @workspace/api-server build

      - name: Create deploy package
        run: |
          rm -rf deploy
          mkdir deploy

          pnpm deploy \
            --filter @workspace/api-server \
            --prod \
            --legacy \
            deploy

      - name: Verify dist exists
        run: |
          test -f deploy/dist/index.mjs && echo "✅ index.mjs found" || (echo "❌ index.mjs MISSING" && exit 1)
          echo "Deploy size: $(du -sh deploy | cut -f1)"

      - name: Create ZIP
        run: |
          cd deploy
          zip -r ../backend.zip . -x "node_modules/.cache/*" "node_modules/.package-lock.json"
          cd ..
          echo "ZIP size: $(du -h backend.zip | cut -f1)"

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name cdsi-backend-final \
            --resource-group CDSI \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false WEBSITE_RUN_FROM_PACKAGE=0

      - name: Deploy to Azure
        run: |
          az webapp deploy \
            --name cdsi-backend-final \
            --resource-group CDSI \
            --src-path backend.zip \
            --type zip \
            --async true

      - name: Restart App Service
        run: |
          sleep 30
          az webapp restart --name cdsi-backend-final --resource-group CDSI
