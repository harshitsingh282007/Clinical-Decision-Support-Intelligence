name: Deploy CDSI Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: |
          pnpm run typecheck:libs
          pnpm --filter @workspace/api-server build

      - name: Create deploy package
        run: |
          rm -rf deploy
          mkdir deploy

          pnpm deploy \
            --filter @workspace/api-server \
            --prod \
            --legacy \
            deploy

      - name: Verify dist exists in deploy
        run: |
          echo "=== Deploy folder contents ==="
          ls -la deploy/
          echo "=== Dist folder contents ==="
          ls -la deploy/dist/
          echo "=== Checking index.mjs exists ==="
          test -f deploy/dist/index.mjs && echo "✅ index.mjs found" || (echo "❌ index.mjs MISSING" && exit 1)

      - name: Create ZIP for deployment
        run: |
          cd deploy
          zip -r ../backend-deploy.zip . -x "node_modules/.cache/*"
          cd ..
          echo "ZIP size: $(du -h backend-deploy.zip | cut -f1)"

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stop App Service
        run: az webapp stop --name cdsi-backend-final --resource-group CDSI

      - name: Deploy via Azure CLI
        run: |
          az webapp config appsettings set \
            --name cdsi-backend-final \
            --resource-group CDSI \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false WEBSITE_RUN_FROM_PACKAGE=0

          az webapp deploy \
            --name cdsi-backend-final \
            --resource-group CDSI \
            --src-path backend-deploy.zip \
            --type zip \
            --clean true \
            --restart false

      - name: Start App Service
        if: always()
        run: az webapp start --name cdsi-backend-final --resource-group CDSI
