name: Deploy CDSI Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: |
          pnpm run typecheck:libs
          pnpm --filter @workspace/api-server build

      - name: Create deploy package
        run: |
          rm -rf deploy
          mkdir deploy

          pnpm deploy \
            --filter @workspace/api-server \
            --prod \
            --legacy \
            deploy

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stop Azure Web App
        run: az webapp stop --name cdsi-backend-final --resource-group CDSI

      - uses: azure/webapps-deploy@v3
        with:
          app-name: cdsi-backend-final
          package: deploy

      - name: Start Azure Web App
        if: always()
        run: az webapp start --name cdsi-backend-final --resource-group CDSI
