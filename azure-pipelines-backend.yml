trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
- group: WebDev

steps:
- checkout: self
  clean: true

- task: NodeTool@0
  inputs:
    versionSpec: '22.x'
  displayName: Use Node.js 22

- script: |
    corepack enable
    corepack prepare pnpm@10.34.5 --activate
    pnpm install --frozen-lockfile
  displayName: Install dependencies

- script: |
    pnpm run typecheck:libs
    pnpm --filter @workspace/api-server build
  displayName: Build Backend

# Create isolated production deployment folder using pnpm deploy (symlink-free)
- script: |
    pnpm deploy --filter @workspace/api-server --prod --legacy $(Agent.TempDirectory)/deploy
  displayName: Prepare production package

- task: ArchiveFiles@2
  displayName: Create deployment package
  inputs:
    rootFolderOrFile: '$(Agent.TempDirectory)/deploy'
    includeRootFolder: false
    archiveType: zip
    archiveFile: '$(Build.ArtifactStagingDirectory)/backend.zip'
    replaceExistingArchive: true

- task: AzureCLI@2
  displayName: Configure App Settings
  inputs:
    azureSubscription: 'CDSI-Backend-Connection'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az webapp config appsettings set --name cdsi-backend-final --resource-group CDSI --settings WEBSITE_RUN_FROM_PACKAGE=1

- task: AzureWebApp@1
  displayName: Deploy Backend
  inputs:
    azureSubscription: 'CDSI-Backend-Connection'
    appType: webAppLinux
    appName: cdsi-backend-final
    package: '$(Build.ArtifactStagingDirectory)/backend.zip'